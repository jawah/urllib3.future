name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3"
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: "actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405"
        with:
          python-version: "3.x"
          cache: "pip"

      - name: "Check packages"
        run: |
          python -m pip install -U pip setuptools wheel build twine rstcheck
          python -m build
          rstcheck CHANGES.rst
          python -m twine check dist/*

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
        os:
          - macos-15-intel
          - windows-2025
          - ubuntu-24.04
        nox-session: ['']
        include:
          - experimental: false
            traefik-server: true
          - traefik-server: false
            nox-session: test_ssl_large_resources-3.7
            python-version: "3.7"
            os: windows-2025
            experimental: false
          - traefik-server: false
            nox-session: test_ssl_large_resources-3.9
            python-version: "3.9"
            os: windows-2025
            experimental: false
          - traefik-server: false
            nox-session: test_ssl_large_resources-3.13
            python-version: "3.13"
            os: windows-2025
            experimental: false
          - traefik-server: false
            nox-session: test_ssl_large_resources-3.9
            python-version: "3.9"
            os: ubuntu-24.04
            experimental: false
          - traefik-server: false
            nox-session: test_ssl_large_resources-3.13
            python-version: "3.13"
            os: ubuntu-24.04
            experimental: false
          - traefik-server: true
            nox-session: test_rtls-3.13
            python-version: "3.13"
            os: ubuntu-24.04
            experimental: false
          - traefik-server: true
            nox-session: test_rtls-3.12
            python-version: "3.12"
            os: ubuntu-24.04
            experimental: false
          - traefik-server: true
            nox-session: test_rtls-3.11
            python-version: "3.11"
            os: ubuntu-24.04
            experimental: false
          - traefik-server: true
            nox-session: test_rtls-3.11
            python-version: "3.11"
            os: windows-2025
            experimental: false
          - python-version: "pypy-3.7"
            os: ubuntu-24.04
            experimental: false
            nox-session: test-pypy
          - python-version: "pypy-3.8"
            os: ubuntu-24.04
            experimental: false
            nox-session: test-pypy
            traefik-server: true
          - python-version: "pypy-3.9-v7.3.13"  # urllib3#3308
            os: ubuntu-24.04
            experimental: false
            nox-session: test-pypy
            traefik-server: true
          - python-version: "pypy-3.10"
            os: ubuntu-24.04
            experimental: false
            nox-session: test-pypy
            traefik-server: true
          - python-version: "pypy-3.11"
            os: ubuntu-24.04
            experimental: false
            nox-session: test-pypy
            traefik-server: true
          - python-version: "3.x"
            os: ubuntu-24.04
            experimental: false
            nox-session: test_brotlipy
          - traefik-server: false
            nox-session: test_pysocks-3.9
            python-version: "3.9"
            os: ubuntu-24.04
            experimental: false
          - traefik-server: false
            nox-session: test_pysocks-3.10
            python-version: "3.10"
            os: ubuntu-24.04
            experimental: false
        exclude:
          - python-version: "3.7"
            os: ubuntu-24.04
          - python-version: "3.8"
            os: ubuntu-24.04
          - python-version: "3.7"
            os: macos-15-intel
          - python-version: "3.8"
            os: macos-15-intel

    runs-on: ${{ matrix.os }}
    name: ${{ fromJson('{"macos-15-intel":"macOS","windows-2025":"Windows","ubuntu-24.04":"Ubuntu"}')[matrix.os] }} ${{ matrix.python-version }} ${{ matrix.nox-session }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 35
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3"
        with:
          persist-credentials: false

      - name: "Traefik: Setup Docker - Colima (MacOS)"
        if: ${{ matrix.traefik-server && contains(matrix.os, 'mac') }}
        uses: douglascamata/setup-docker-macos-action@d5ccc6aae0ce23e7700154f5e63cc53e6433ac48
        with:
          colima-network-address: true

      - name: "Get Colima VM IP Address (MacOS)"
        if: ${{ matrix.traefik-server && contains(matrix.os, 'mac') }}
        id: colima-ip
        run: |
          # Get the IP address from colima list output
          COLIMA_IP=$(colima list | grep -E "^\s*default\s+" | awk '{print $NF}')

          # Fallback to default if not found
          if [ -z "$COLIMA_IP" ]; then
            echo "::warning: could not read IP address from 'colima list'"
            colima list
            COLIMA_IP="192.168.65.2"
          fi

          echo "autodiscover=$COLIMA_IP" >> $GITHUB_OUTPUT
          echo "Colima VM IP: $COLIMA_IP"

      - name: "Setup Python ${{ matrix.python-version }}"
        uses: "actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405"
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: "Install dependencies"
        run: python -m pip install --upgrade pip setuptools nox

      - name: "Ensure Docker is ready (Windows)"
        # Workaround for https://github.com/actions/runner-images/issues/13729
        if: ${{ contains(matrix.os, 'windows') && matrix.traefik-server }}
        shell: pwsh
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if (-not $svc) {
            Write-Error "Docker service not found"
            exit 1
          }
          if ($svc.Status -ne 'Running') {
            Write-Host "Docker service status: $($svc.Status). Starting..."
            Start-Service docker -ErrorAction Stop
          }
          $timeout = 120
          while ($timeout -gt 0) {
            & docker info >$null 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker is ready"
              exit 0
            }
            Write-Host "Waiting for Docker daemon... (${timeout}s remaining)"
            Start-Sleep -Seconds 3
            $timeout -= 3
          }
          Write-Error "Docker daemon did not become ready within 120s"
          exit 1

      - name: "Run tests"
        # see https://github.com/actions/runner-images/issues/10924
        # for context on why macOS runner need sudo(...)
        run: ${{ contains(matrix.os, 'mac') && 'sudo -E' || '' }} ./ci/run_tests.sh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          NOX_SESSION: ${{ matrix.nox-session }}
          TRAEFIK_HTTPBIN_ENABLE: ${{ matrix.traefik-server }}
          TRAEFIK_HTTPBIN_IPV4: ${{ contains(matrix.os, 'mac') && steps.colima-ip.outputs.autodiscover || '127.0.0.1' }}

      - name: "Upload artifact"
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
        with:
          name: coverage-data-${{ matrix.os }}-${{ matrix.nox-session }}-${{ matrix.python-version }}-${{ matrix.traefik-server }}
          path: ".coverage.*"
          include-hidden-files: true
          if-no-files-found: error

  dead-libressl:
    name: Docker LibreSSL <2.8
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3"
        with:
          persist-credentials: false

      - name: "Run against Python 3.7 built with LibreSSL 2.7.4"
        run: ./ci/run_legacy_libressl.sh

      - name: "Upload coverage"
        if: always()
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
        with:
          name: coverage-data-docker-legacy-libressl
          path: ".coverage.*"
          include-hidden-files: true
          if-no-files-found: ignore

  dead-openssl:
    name: Docker OpenSSL <1.1.1
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3"
        with:
          persist-credentials: false

      - name: "Run against Python 3.7 built with OpenSSL 1.0.2q"
        run: ./ci/run_legacy_openssl.sh

      - name: "Upload coverage"
        if: always()
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
        with:
          name: coverage-data-docker-legacy-openssl
          path: ".coverage.*"
          include-hidden-files: true
          if-no-files-found: ignore

  fips-openssl:
    name: Docker OpenSSL FIPS
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3"
        with:
          persist-credentials: false

      - name: "Run against Python 3.12 built with OpenSSL FIPS"
        run: ./ci/run_fips_openssl.sh

      - name: "Upload coverage"
        if: always()
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
        with:
          name: coverage-data-docker-fips-openssl
          path: ".coverage.*"
          include-hidden-files: true
          if-no-files-found: ignore

  edge-static-openssl:
    name: Docker Static Linked OpenSSL
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3"
        with:
          persist-credentials: false

      - name: "Run against Python 3.12 built with Statically Linked OpenSSL"
        run: ./ci/run_static_openssl.sh

      - name: "Upload coverage"
        if: always()
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
        with:
          name: coverage-data-docker-static-openssl
          path: ".coverage.*"
          include-hidden-files: true
          if-no-files-found: ignore

  coverage:
    if: always()
    runs-on: "ubuntu-latest"
    needs: [test, dead-libressl, dead-openssl, edge-static-openssl, fips-openssl]
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3"
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: "actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405"
        with:
          python-version: "3.x"

      - name: "Install coverage"
        run: "python -m pip install --upgrade coverage"

      - name: "Download artifact"
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: coverage-data*
          merge-multiple: true

      - name: "Combine & check coverage"
        run: |
          python -m coverage combine
          python -m coverage html --skip-covered --skip-empty
          python -m coverage report --ignore-errors --show-missing --fail-under=80

      - name: "Upload report"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-report
          path: htmlcov
